<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firmare · Dashboard Gerencial</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* Paleta institucional */
  --dourado:        #C5A467;
  --dourado-claro:  #D4B97A;
  --dourado-pale:   #E0D8C3;
  --marrom:         #5C3317;
  --marrom-med:     #7A4520;
  --fundo:          #F9F7F2;
  --card:           #FFFFFF;
  --texto:          #1A1A1A;
  --texto-suave:    #666666;
  --bege:           #E0D8C3;
  --bege-escuro:    #C8BCA8;
  --verde:          #2E7D52;
  --vermelho:       #B03A2E;
  --sombra:         0 4px 10px rgba(0,0,0,.05);
  --sombra-med:     0 8px 24px rgba(0,0,0,.08);
  --radius:         12px;
  --t:              .2s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--fundo);color:var(--texto);font-size:14px;line-height:1.6;min-height:100vh;}

/* ── LOGIN ─────────────────────────────────────── */
#login-screen{position:fixed;inset:0;background:var(--marrom);display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-box{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:2.75rem 3rem;width:360px;text-align:center;}
.login-logo{height:56px;object-fit:contain;margin-bottom:1.75rem;}
.login-box h2{font-family:'Montserrat',sans-serif;color:#fff;font-size:1.2rem;font-weight:700;letter-spacing:1px;margin-bottom:.3rem;}
.login-box p{font-size:.72rem;color:rgba(255,255,255,.35);margin-bottom:2rem;letter-spacing:2px;text-transform:uppercase;}
.login-input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:.8rem 1rem;font-family:'Inter',sans-serif;font-size:.88rem;color:#fff;text-align:center;letter-spacing:3px;margin-bottom:1rem;transition:var(--t);}
.login-input:focus{outline:none;border-color:var(--dourado);background:rgba(255,255,255,.12);}
.login-input::placeholder{color:rgba(255,255,255,.25);letter-spacing:1px;}
.login-btn{width:100%;background:var(--dourado);border:none;border-radius:10px;padding:.82rem;font-family:'Montserrat',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#fff;cursor:pointer;transition:var(--t);}
.login-btn:hover{background:var(--dourado-claro);transform:translateY(-1px);box-shadow:0 4px 14px rgba(197,164,103,.35);}
.login-error{font-size:.72rem;color:#ff9090;margin-top:.5rem;min-height:18px;}

/* ── LAYOUT ────────────────────────────────────── */
.layout{display:flex;min-height:100vh;}
.sidebar{width:224px;flex-shrink:0;background:var(--marrom);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;}
.sidebar-logo-wrap{padding:1.6rem 1.5rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.07);}
.sidebar-logo-img{height:40px;object-fit:contain;}
.sidebar-nav{flex:1;padding:1.25rem 0;}
.nav-label{font-size:.58rem;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.28);padding:0 1.5rem;margin-bottom:.5rem;margin-top:.75rem;}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.7rem 1.25rem;margin:2px .75rem;color:rgba(255,255,255,.55);cursor:pointer;transition:var(--t);font-size:.88rem;font-weight:500;border-left:none;border-radius:8px;border:1px solid transparent;user-select:none;letter-spacing:.3px;}
.nav-item:hover{color:rgba(255,255,255,.9);background:rgba(255,255,255,.06);border-left-color:rgba(197,164,103,.4);}
.nav-item.active{color:var(--dourado-claro);border-left-color:var(--dourado);background:rgba(197,164,103,.12);font-weight:700;box-shadow:inset 0 0 0 1px rgba(197,164,103,.2);}
.nav-icon{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.sidebar-footer{padding:1rem 1.5rem;border-top:1px solid rgba(255,255,255,.07);font-size:.65rem;color:rgba(255,255,255,.22);line-height:1.6;}

/* ── MAIN ──────────────────────────────────────── */
.main{margin-left:224px;flex:1;display:flex;flex-direction:column;min-height:100vh;}

/* ── TOPBAR ────────────────────────────────────── */
.topbar{background:var(--card);border-bottom:1px solid var(--bege);padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;position:sticky;top:0;z-index:50;}
.topbar-left{display:flex;align-items:center;gap:1rem;}
.page-title{font-family:'Montserrat',sans-serif;font-size:1.1rem;font-weight:800;color:var(--dourado);letter-spacing:3px;text-transform:uppercase;min-width:160px;}
/* Filtros sem borda preta */
.ms-wrap{position:relative;}
.ms-btn{appearance:none;background:#fff;border:1px solid #E0E0E0;border-radius:10px;padding:.4rem 2rem .4rem .85rem;font-family:'Inter',sans-serif;font-size:.78rem;color:var(--texto);cursor:pointer;transition:var(--t);white-space:nowrap;min-width:170px;text-align:left;}
.ms-btn:hover,.ms-btn.open{border-color:var(--dourado);box-shadow:0 0 0 3px rgba(197,164,103,.12);}
.ms-arrow{position:absolute;right:.65rem;top:50%;transform:translateY(-50%);pointer-events:none;font-size:.58rem;color:var(--texto-suave);}
.ms-dropdown{position:absolute;top:calc(100% + 5px);left:0;min-width:210px;background:#fff;border:1px solid #E0E0E0;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.1);z-index:200;display:none;padding:.4rem 0;}
.ms-dropdown.open{display:block;}
.ms-item{display:flex;align-items:center;gap:.65rem;padding:.38rem .9rem;cursor:pointer;font-size:.78rem;color:var(--texto);transition:var(--t);}
.ms-item:hover{background:var(--fundo);}
.ms-item input[type=checkbox]{accent-color:var(--marrom);width:13px;height:13px;cursor:pointer;flex-shrink:0;}
.ms-divider{height:1px;background:#F0F0F0;margin:.3rem 0;}
.ms-only{margin-left:auto;font-size:.64rem;color:var(--dourado);cursor:pointer;white-space:nowrap;padding:.1rem .45rem;border-radius:4px;border:1px solid transparent;flex-shrink:0;}
.ms-only:hover{border-color:var(--dourado);background:rgba(197,164,103,.08);}
.date-input{appearance:none;background:#fff;border:1px solid #E0E0E0;border-radius:10px;padding:.4rem .85rem;font-family:'Inter',sans-serif;font-size:.78rem;color:var(--texto);cursor:pointer;transition:var(--t);}
.date-input:focus{outline:none;border-color:var(--dourado);}
.date-sep{font-size:.75rem;color:var(--texto-suave);}
.topbar-right{display:flex;align-items:center;gap:1rem;}
.status-dot{display:flex;align-items:center;gap:.4rem;font-size:.7rem;color:var(--texto-suave);}
.dot-live{width:7px;height:7px;border-radius:50%;background:var(--verde);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.btn-refresh{display:flex;align-items:center;gap:.4rem;background:none;border:1px solid #E0E0E0;border-radius:8px;padding:.4rem .85rem;font-family:'Inter',sans-serif;font-size:.74rem;color:var(--texto-suave);cursor:pointer;transition:var(--t);}
.btn-refresh:hover{border-color:var(--dourado);color:var(--marrom);}
.pdf-btn{display:flex;align-items:center;gap:.4rem;background:none;border:1px solid var(--dourado);border-radius:8px;padding:.4rem .85rem;font-family:'Inter',sans-serif;font-size:.74rem;color:var(--dourado);cursor:pointer;transition:var(--t);font-weight:600;}
.pdf-btn:hover{background:var(--dourado);color:#fff;}
/* Linha divisória abaixo do topbar */
.topbar-divider{height:1px;background:var(--bege);margin:0;}

/* ── CONTENT ───────────────────────────────────── */
.content{flex:1;padding:2rem;}

/* LOADING / ERROR */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:1rem;}
.spinner{width:36px;height:36px;border:2px solid var(--bege);border-top-color:var(--dourado);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:.8rem;color:var(--texto-suave);}
.error-box{background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--radius);padding:1.5rem;color:#991B1B;font-size:.85rem;max-width:500px;margin:2rem auto;}

/* ── PERIOD BAR ────────────────────────────────── */
.period-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem;flex-wrap:wrap;gap:.75rem;}
.period-badge{font-size:.7rem;letter-spacing:1px;text-transform:uppercase;color:var(--texto-suave);background:var(--card);border:1px solid var(--bege);border-radius:20px;padding:.3rem 1rem;}
.semana-nav{display:flex;align-items:center;gap:.5rem;}
.semana-nav button{background:none;border:1px solid #E0E0E0;border-radius:8px;width:28px;height:28px;cursor:pointer;color:var(--texto-suave);display:flex;align-items:center;justify-content:center;transition:var(--t);}
.semana-nav button:hover{border-color:var(--dourado);color:var(--marrom);}
.semana-nav button:disabled{opacity:.3;cursor:default;}
.semana-nav span{font-size:.78rem;color:var(--texto-suave);min-width:160px;text-align:center;}

/* ── KPI CARDS ─────────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem;}
.kpi-card{
  background:var(--card);
  border:none;
  border-radius:var(--radius);
  padding:1.3rem 1.5rem;
  box-shadow:var(--sombra);
  transition:var(--t);
}
.kpi-card:hover{box-shadow:var(--sombra-med);transform:translateY(-1px);}
.kpi-card.borda-marrom{box-shadow:var(--sombra) !important;border-left:3px solid var(--dourado) !important;}
/* Rótulos: 12px, cinza, negrito */
.kpi-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--texto-suave);margin-bottom:.5rem;}
/* Números: grandes, dourado */
.kpi-value{font-family:'Montserrat',sans-serif;font-size:1.85rem;font-weight:700;color:var(--dourado);line-height:1;}
.kpi-value.sm{font-size:1.4rem;}
.kpi-sub{font-size:.68rem;color:var(--texto-suave);margin-top:.3rem;}
.kpi-compare{display:flex;align-items:center;gap:.3rem;font-size:.7rem;font-weight:500;margin-top:.4rem;}
.kpi-compare.up{color:var(--verde);}
.kpi-compare.down{color:var(--vermelho);}
.kpi-compare.eq{color:var(--texto-suave);}
.kpi-card.destaque{box-shadow:var(--sombra);border-left:3px solid var(--dourado);}
.kpi-card.destaque .kpi-value{color:var(--dourado);}

/* ── PROGRESS ──────────────────────────────────── */
.progress-card{background:var(--card);border:none;box-shadow:var(--sombra);border-radius:var(--radius);padding:1.2rem 1.4rem;margin-bottom:1.5rem;}
.progress-card.compact{padding:.9rem 1.1rem;margin-bottom:0;}
.progress-card.compact .progress-header{margin-bottom:.5rem;}
.progress-card.compact .progress-title{font-size:.65rem;}
.progress-card.compact .progress-vals{font-size:.9rem;}
.progress-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.75rem;}
.progress-title{font-size:12px;font-weight:600;color:var(--texto-suave);text-transform:uppercase;letter-spacing:.8px;}
.progress-vals{font-family:'Montserrat',sans-serif;font-size:1rem;font-weight:600;color:var(--dourado);}
.progress-track{height:5px;background:#F0EDE6;border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--marrom),var(--dourado));transition:width .8s ease;}
.progress-pct{font-size:.7rem;color:var(--texto-suave);margin-top:.4rem;text-align:right;}

/* ── CARDS ─────────────────────────────────────── */
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
@media(max-width:900px){.cards-grid{grid-template-columns:1fr;}}
.card{background:var(--card);border:none;border-radius:var(--radius);padding:1.5rem;box-shadow:var(--sombra);}
.card.borda-marrom{border-left:3px solid var(--dourado) !important;box-shadow:var(--sombra) !important;}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--texto-suave);margin-bottom:1rem;padding-bottom:.7rem;border-bottom:1px solid #F0EDE6;}

/* ── FUNIL ─────────────────────────────────────── */
.funil-wrap{display:flex;flex-direction:column;align-items:center;gap:0;width:100%;}
.funil-connector{display:flex;flex-direction:column;align-items:center;width:100%;position:relative;margin:0;}
.funil-conn-line{width:2px;height:20px;background:var(--bege);}
.funil-taxa-badge{background:#fff;border:1px solid var(--bege);border-radius:20px;padding:.18rem .7rem;font-size:.64rem;font-weight:600;color:var(--marrom);white-space:nowrap;position:absolute;top:50%;transform:translateY(-50%);right:1rem;}
.funil-taxa-total{margin-top:1rem;text-align:center;font-size:.75rem;color:var(--texto-suave);padding:.6rem 1rem;background:var(--fundo);border-radius:8px;}
.funil-taxa-total strong{color:var(--dourado);}

/* ── GRÁFICOS ──────────────────────────────────── */
.chart-area{margin-top:.75rem;position:relative;height:130px;}
.chart-svg{width:100%;height:100%;}

/* ── CRIATIVO ──────────────────────────────────── */
.criativo-card{background:var(--fundo);border-radius:10px;padding:1rem;margin-bottom:.75rem;}
.criativo-link{font-size:.75rem;color:var(--dourado);text-decoration:none;word-break:break-all;display:flex;align-items:center;gap:.4rem;margin-bottom:.75rem;font-weight:500;}
.criativo-link:hover{color:var(--marrom);}
.criativo-btn{display:inline-flex;align-items:center;gap:.5rem;background:var(--marrom);color:#fff;text-decoration:none;padding:.6rem 1.1rem;border-radius:8px;font-size:.78rem;font-weight:600;letter-spacing:.3px;margin-bottom:.75rem;transition:var(--t);}
.criativo-btn:hover{background:var(--dourado);color:#fff;transform:translateY(-1px);box-shadow:0 4px 12px rgba(197,164,103,.3);}
.criativo-btn svg{flex-shrink:0;}
.criativo-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;}
.cm-val{font-family:'Montserrat',sans-serif;font-size:1.15rem;font-weight:700;color:var(--dourado);text-align:center;}
.cm-lbl{font-size:.58rem;color:var(--texto-suave);text-transform:uppercase;letter-spacing:.5px;text-align:center;margin-top:.1rem;}

/* ── TOP 5 ─────────────────────────────────────── */
.top5-list{display:flex;flex-direction:column;gap:.3rem;}
.top5-item{display:flex;align-items:flex-start;gap:.6rem;padding:.55rem .75rem;border-radius:8px;background:var(--fundo);font-size:.8rem;transition:var(--t);}
.top5-item:hover{background:#F0EDE6;}
.top5-num{font-family:'Montserrat',sans-serif;font-size:.85rem;font-weight:700;color:var(--dourado);min-width:18px;}

/* ── ANÁLISE ───────────────────────────────────── */
.analise-box{background:var(--fundo);border-left:3px solid var(--dourado);border-radius:0 8px 8px 0;padding:1rem 1.2rem;font-size:.8rem;color:var(--texto);line-height:1.7;}

/* ── CAMPANHA ──────────────────────────────────── */
.campanha-card{background:var(--fundo);border-radius:10px;padding:1rem 1.1rem;margin-bottom:.65rem;}
.campanha-nome{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--texto-suave);margin-bottom:.7rem;}
.campanha-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;}
.cm2-val{font-family:'Montserrat',sans-serif;font-size:1.05rem;font-weight:700;color:var(--dourado);}
.cm2-lbl{font-size:.58rem;color:var(--texto-suave);text-transform:uppercase;letter-spacing:.5px;margin-top:.1rem;}

/* ── INSIGHTS ──────────────────────────────────── */
.insights-header{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;color:var(--texto-suave);margin-bottom:.4rem;}
.insights-sub{font-size:.78rem;color:var(--texto-suave);margin-bottom:1.5rem;line-height:1.5;}
.insights-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
@media(max-width:900px){.insights-grid{grid-template-columns:1fr;}}
.insight-card{
  background:var(--card);
  border:none;
  border-left:4px solid var(--bege-escuro);
  border-radius:var(--radius);
  padding:1.35rem 1.5rem;
  box-shadow:var(--sombra);
  transition:var(--t);
}
.insight-card:hover{box-shadow:var(--sombra-med);transform:translateY(-1px);}
.insight-card.red{border-left-color:#B03A2E;}
.insight-card.green{border-left-color:#2E7D52;}
.insight-card.yellow{border-left-color:#C5A467;}
/* Título dourado + negrito */
.insight-title{font-size:.88rem;font-weight:700;color:var(--dourado);margin-bottom:.5rem;line-height:1.4;}
/* Corpo com line-height 1.5 */
.insight-desc{font-size:.78rem;color:var(--texto-suave);line-height:1.6;}
.insights-loading{display:flex;flex-direction:column;align-items:center;gap:.75rem;padding:3rem;color:var(--texto-suave);font-size:.8rem;}

/* ── MISC ──────────────────────────────────────── */
.empty{color:var(--bege-escuro);font-size:.78rem;font-style:italic;padding:.5rem 0;}

/* ── RESPONSIVO MOBILE ─────────────────────────────────────── */
.menu-toggle{display:none;background:none;border:none;cursor:pointer;padding:.5rem;color:var(--texto);}
.menu-toggle svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;}
@media(max-width:768px){
  body{font-size:13px;}
  .sidebar{width:100%;height:auto;position:relative;flex-direction:row;flex-wrap:wrap;}
  .sidebar-logo-wrap{flex:1;padding:1rem 1.25rem .75rem;}
  .menu-toggle{display:flex;align-items:center;padding:1rem 1.25rem;}
  .sidebar-nav{display:none;width:100%;padding:.5rem 0 1rem;border-top:1px solid rgba(255,255,255,.08);}
  .sidebar-nav.open{display:block;}
  .sidebar-footer{display:none;}
  .main{margin-left:0;}
  .topbar{padding:.75rem 1rem;flex-wrap:wrap;gap:.5rem;}
  .topbar-left{flex-wrap:wrap;gap:.5rem;width:100%;}
  .page-title{font-size:.9rem;min-width:unset;}
  .ms-btn{min-width:130px;font-size:.72rem;}
  .date-input{font-size:.72rem;padding:.35rem .6rem;}
  .topbar-right{width:100%;justify-content:flex-end;}
  .content{padding:1rem;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  div[style*="repeat(4,1fr)"]{grid-template-columns:repeat(2,1fr) !important;}
  div[style*="repeat(5,1fr)"]{grid-template-columns:repeat(2,1fr) !important;}
  div[style*="1fr 1fr"]{grid-template-columns:1fr !important;}
  div[style*="1fr 1.4fr"]{grid-template-columns:1fr !important;}
  div[style*="1fr 1.8fr"]{grid-template-columns:1fr !important;}
  div[style*="1fr 1fr 1fr 1.8fr"]{grid-template-columns:repeat(2,1fr) !important;}
  .cards-grid{grid-template-columns:1fr !important;}
  .insights-grid{grid-template-columns:1fr !important;}
  .period-bar{flex-direction:column;align-items:flex-start;}
  .semana-nav span{min-width:120px;}
  .login-box{width:90vw;padding:2rem 1.5rem;}
  .funil-taxa-badge{right:.5rem;font-size:.58rem;}
}
@media(max-width:480px){
  .kpi-grid{grid-template-columns:1fr 1fr;}
  .kpi-value{font-size:1.5rem;}
  .kpi-value.sm{font-size:1.15rem;}
}
.section-row{display:flex;align-items:center;gap:.75rem;margin:1.25rem 0 .85rem;}
.section-line{flex:1;height:1px;background:var(--bege);}
.section-label{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--bege-escuro);white-space:nowrap;}
/* Botão PDF */
.btn-pdf{display:flex;align-items:center;gap:.4rem;background:none;border:1px solid #E0E0E0;border-radius:8px;padding:.4rem .85rem;font-family:'Inter',sans-serif;font-size:.74rem;color:var(--texto-suave);cursor:pointer;transition:var(--t);}
.btn-pdf:hover{border-color:var(--dourado);color:var(--dourado);}
@media print{
  #login-screen,#sidebar,.topbar,.btn-pdf,.btn-refresh,.semana-nav,.ms-wrap,.date-input,.date-sep,.status-dot{display:none!important;}
  .main{margin-left:0!important;}
  .content{padding:.5rem!important;}
  body{background:#fff!important;}
  .kpi-card,.card,.progress-card,.insight-card{box-shadow:none!important;border:1px solid #ddd!important;}
  .period-bar{margin-bottom:.75rem!important;}
}
/* ── RESPONSIVO MOBILE ─────────────────────────────────── */
.menu-toggle{display:none;background:none;border:none;cursor:pointer;padding:.4rem;color:var(--texto);}
.menu-toggle svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .3s ease;z-index:110;}
      .main{margin-left:0;}
  .topbar{padding:.75rem 1rem;flex-wrap:wrap;gap:.5rem;}

  .insights-grid{grid-template-columns:1fr !important;}

}

  #login-screen,#sidebar-overlay,.sidebar,.topbar,.pdf-btn,.menu-toggle,.ms-dropdown,.semana-nav button{display:none !important;}
  .main{margin-left:0 !important;}
  .content{padding:.5rem !important;}
  .kpi-card,.card,.progress-card,.insight-card{box-shadow:none !important;border:1px solid #E0D8C3 !important;}
  body{background:#fff !important;}
  .cards-grid,.insights-grid{page-break-inside:avoid;}
}

<script>
// ── CONFIG ────────────────────────────────────────────────
// ── MOBILE MENU ──────────────────────────────────────────
function toggleMenu(){
  const nav=document.getElementById('sidebar-nav');
  if(nav) nav.classList.toggle('open');
}
// Fechar menu mobile ao clicar em item (executado inline após DOM pronto)

// ── DOWNLOAD PDF ──────────────────────────────────────────
function downloadPDF(){
  const titulo = document.getElementById('page-title')?.textContent || 'Dashboard';
  document.title = 'Firmare · ' + titulo;
  window.print();
  setTimeout(()=>{ document.title = 'Firmare · Dashboard Gerencial'; }, 2000);
}

// ── LOGIN ─────────────────────────────────────────────────
document.getElementById('login-input').addEventListener('keydown', e => { if(e.key==='Enter') tentarLogin(); });
function tentarLogin(){
  const v = document.getElementById('login-input').value;
  if(v === SENHA){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    carregarDados();
  } else {
    document.getElementById('login-error').textContent='Senha incorreta.';
    document.getElementById('login-input').value='';
    setTimeout(()=>document.getElementById('login-error').textContent='', 2500);
  }
}

// ── HELPERS ───────────────────────────────────────────────
const fmt = {
  brl: v => { const n=parseFloat(v); return isNaN(n)?'—':'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); },
  num: v => { const n=parseFloat(v); return isNaN(n)?'—':n.toLocaleString('pt-BR'); },
  pct: v => { const n=parseFloat(v); return isNaN(n)?'—':n.toFixed(1)+'%'; },
};
function safe(v){
  if(v===null||v===undefined) return '';
  const s = String(v).trim();
  return (s && s!=='null' && s!=='#N/A') ? s : '';
}
function col(row,header,headers){ const i=headers.indexOf(header); return i===-1?'':(row[i]||'').trim(); }
function get(r,campo){ return safe(col(r._row,campo,r._headers)); }
function getCons(rc, campo){
  if(!rc) return '';
  if(rc._consolidated) return rc._vals[campo]!==undefined ? rc._vals[campo] : get(rc._rows[0], campo);
  return get(rc, campo);
}
function parseNum(v){
  if(v===null||v===undefined||v==='') return null;
  if(typeof v === 'number') return isNaN(v)?null:v;
  const s = String(v).trim().replace(/\s/g,'').replace(',','.');
  const n = parseFloat(s);
  return isNaN(n)?null:n;
}

function comparativo(atual, anterior){
  const a=parseNum(atual), b=parseNum(anterior);
  if(a===null||b===null||b===0) return '<span class="kpi-compare eq">— sem comparativo</span>';
  const diff=a-b, pct=((diff/Math.abs(b))*100).toFixed(1);
  const cls=diff>=0?'up':'down', seta=diff>=0?'▲':'▼';
  return `<span class="kpi-compare ${cls}">${seta} ${Math.abs(pct)}% vs período ant.</span>`;
}

// ── CSV PARSE ─────────────────────────────────────────────
function parseCSV(text){
  const lines=[]; let cur='',inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(c==='"'){inQ=!inQ;}
    else if(c==='\n'&&!inQ){lines.push(cur);cur='';}
    else{cur+=c;}
  }
  if(cur) lines.push(cur);
  return lines.map(line=>{
    const cells=[]; let cell='',q=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){q=!q;}
      else if(c===','&&!q){cells.push(cell.trim());cell='';}
      else{cell+=c;}
    }
    cells.push(cell.trim());
    return cells;
  });
}

// ── CARREGAR DADOS ────────────────────────────────────────
async function carregarDados(){
  document.getElementById('status-txt').textContent='Atualizando...';
  try{
    const res=await fetch(`${SHEET_CSV_URL}&t=${Date.now()}`);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const text=await res.text();
    const rows=parseCSV(text);
    if(rows.length<2) throw new Error('Planilha vazia');
    const headers=rows[0].map(h=>h.replace(/\r/g,''));
    todosRegistros=rows.slice(1).filter(r=>r.some(c=>c.trim())).map(r=>({_row:r,_headers:headers}));
    const clientes=[...new Set(todosRegistros.map(r=>col(r._row,'Cliente',r._headers)).filter(Boolean))];
    const list=document.getElementById('ms-list');
    if(list){
      list.innerHTML=clientes.map(c=>`<div class="ms-item">
        <input type="checkbox" class="ms-cliente-cb" value="${c}" checked onchange="atualizarClientesSelecionados()">
        <span style="flex:1">${c}</span>
        <span class="ms-only" onclick="somenteEste(event,'${c}')">somente este</span>
      </div>`).join('');
    }
    clientesSelecionados=[...clientes];
    const label=clientes.length===1?clientes[0]:'Todos os clientes';
    const btn=document.getElementById('ms-btn');
    if(btn) btn.textContent=label;
    document.getElementById('status-txt').textContent='Atualizado';
    semanaIdx=0;
    renderModulo();
  } catch(e){
    console.error(e);
    document.getElementById('status-txt').textContent='Erro';
    document.getElementById('content').innerHTML=`<div class="error-box"><strong>Não foi possível carregar os dados.</strong><br>Verifique se a planilha está publicada (Arquivo → Compartilhar → Publicar na web → CSV).<br><small>${e.message}</small></div>`;
  }
}

// ── FILTROS ───────────────────────────────────────────────
function parseData(str){
  if(!str) return null;
  const p=str.split('/');
  if(p.length===3) return new Date(p[2],p[1]-1,p[0]);
  return new Date(str);
}
function registrosFiltrados(){
  let recs=todosRegistros;
  if(clientesSelecionados.length>0)
    recs=recs.filter(r=>clientesSelecionados.includes(col(r._row,'Cliente',r._headers)));
  const df=document.getElementById('date-from').value;
  const dt=document.getElementById('date-to').value;
  if(df) recs=recs.filter(r=>{ const d=parseData(get(r,'Início da Semana (Data da segunda-feira)')); return d&&d>=new Date(df); });
  if(dt) recs=recs.filter(r=>{ const d=parseData(get(r,'Início da Semana (Data da segunda-feira)')); return d&&d<=new Date(dt); });
  return recs.sort((a,b)=>{
    const da=parseData(get(a,'Início da Semana (Data da segunda-feira)'));
    const db=parseData(get(b,'Início da Semana (Data da segunda-feira)'));
    return (db||0)-(da||0);
  });
}

// ── RENDER MÓDULO ─────────────────────────────────────────
function insightsSkeleton(){ return ''; } // não usado mais

function renderModulo(){
  const registros=registrosFiltrados();
  if(!registros.length){
    document.getElementById('content').innerHTML='<div class="empty" style="padding:3rem;text-align:center">Nenhum dado para os filtros selecionados.</div>';
    return;
  }
  // Agrupar registros por semana (para somar múltiplos clientes)
  const semanas = [];
  const semanaMap = {};
  registros.forEach(r => {
    const k = get(r,'Início da Semana (Data da segunda-feira)') || 'sem-data';
    if(!semanaMap[k]) { semanaMap[k]=[]; semanas.push(k); }
    semanaMap[k].push(r);
  });
  semanas.sort((a,b)=>(parseData(b)||0)-(parseData(a)||0));
  semanaIdx=Math.min(semanaIdx,semanas.length-1);
  const semanaKey=semanas[semanaIdx];
  const semanaKeyAnt=semanas[semanaIdx+1]||null;
  // Criar registro consolidado somando campos numéricos
  function consolidar(recs){
    if(!recs||recs.length===0) return null;
    if(recs.length===1) return recs[0];
    const base=recs[0];
    const camposNum=['Receita Bruta da Semana','Despesas Totais da Semana','Nº de Vendas Realizadas',
      'Total de Leads Recebidos (Semana)','Leads de Tráfego Convertidos (Venda Direta)',
      'Leads de Recaptação Convertidos (Base antiga)','Leads Fora de Perfil (Desqualificados)',
      'Agendamentos/Visitas Realizadas','Faturamento Acumulado (Mês)','Meta de Faturamento Mensal',
      'Novos Seguidores (Instagram)','Quantidade de Criativos Publicados (Total da semana)',
      'Valor Total Investido (Semana)','Curtidas (Melhor Criativo)','Comentários (Melhor Criativo)',
      'Compartilhamentos (Melhor Criativo)','Visualizações (Melhor Criativo',
      'Leads Recebidos Instagram','Leads Recebidos WhatsApp',
      'Leads Convertidos Instagram','Leads Convertidos WhatsApp'];
    const camposMed=['Ticket Médio da Semana','CPL Médio (Custo por Lead)','CTR Médio (Taxa de Clique)','ROAS (Retorno sobre Investimento)'];
    // Cria registro proxy com valores somados
    const vals={};
    camposNum.forEach(c=>{
      const soma=recs.reduce((s,r)=>s+(parseNum(get(r,c))||0),0);
      vals[c]=soma>0?String(soma):'';
    });
    camposMed.forEach(c=>{
      const nums=recs.map(r=>parseNum(get(r,c))).filter(v=>v!==null);
      vals[c]=nums.length>0?String(nums.reduce((s,v)=>s+v,0)/nums.length):'';
    });
    // Proxy que retorna valores consolidados
    return {
      _consolidated: true,
      _rows: recs,
      _vals: vals,
      _headers: base._headers,
      _row: base._row
    };
  }
  function getCons(rc, campo){
    if(rc && rc._consolidated) return rc._vals[campo]!==undefined ? rc._vals[campo] : get(rc._rows[0], campo);
    return rc ? get(rc, campo) : '';
  }
  const grpAtual = semanaMap[semanaKey]||[];
  const grpAnt   = semanaKeyAnt ? semanaMap[semanaKeyAnt]||[] : [];
  const r   = consolidar(grpAtual);
  const rAnt= grpAnt.length>0 ? consolidar(grpAnt) : null;
  // Override get para usar getCons quando consolidado
  const _get=(rc,c)=>getCons(rc,c);
  const di=grpAtual[0]?get(grpAtual[0],'Início da Semana (Data da segunda-feira)'):'';
  const df=grpAtual[0]?get(grpAtual[0],'Fim da Semana (Data do domingo)'):'';
  const periodo=di&&df?`${di} — ${df}`:di||'—';
  const badgeLabel = clientesSelecionados.length===0?'Nenhum cliente':clientesSelecionados.length===1?clientesSelecionados[0]:clientesSelecionados.length===registrosFiltrados.length?'Todos os clientes':`${clientesSelecionados.length} clientes`;
  const nav=`<div class="period-bar">
    <div class="period-badge">${clientesSelecionados.length===1?clientesSelecionados[0]:clientesSelecionados.length===0?'Nenhum':clientesSelecionados.length+' clientes selecionados'}</div>
    <div class="semana-nav">
      <button onclick="navegarSemana(1)" title="Semana anterior">&#8592;</button>
      <span>${periodo}</span>
      <button onclick="navegarSemana(-1)" title="Próxima semana" ${semanaIdx===0?'disabled':''}> &#8594;</button>
    </div>
  </div>`;
  const syncRenders={financeiro:renderFinanceiro,comercial:renderComercial,marketing:renderMarketing,trafego:renderTrafego};
  if(moduloAtivo==='insights'){
    document.getElementById('content').innerHTML=nav+`
      <div class="insights-header">Insights de Mídia</div>
      <div class="insights-sub">Gerados automaticamente com base nos dados do período selecionado.</div>
      <div class="insights-grid" id="insights-grid"></div>`;
    gerarInsightsIA(r,rAnt,registros,_get);
  } else {
    document.getElementById('content').innerHTML=nav+(syncRenders[moduloAtivo]?.(r,rAnt,registros,_get)||'');
  }
}

function navegarSemana(dir){
  const registros=registrosFiltrados();
  semanaIdx=Math.max(0,Math.min(registros.length-1,semanaIdx+dir));
  renderModulo();
}

// ── LINE CHART SVG ────────────────────────────────────────
function lineChart(registros, campo, fmtFn){
  const vals=registros.slice(0,8).reverse();
  const nums=vals.map(r=>parseNum(get(r,campo))||0);
  const max=Math.max(...nums,1), min=0;
  const W=400, H=80, pad=10;
  const pts=nums.map((v,i)=>{
    const x=pad+(i/(nums.length-1||1))*(W-2*pad);
    const y=H-pad-((v-min)/(max-min||1))*(H-2*pad);
    return [x,y];
  });
  const path='M '+pts.map(p=>p.join(',')).join(' L ');
  const area='M '+pts[0][0]+','+H+' L '+pts.map(p=>p.join(',')).join(' L ')+' L '+pts[pts.length-1][0]+','+H+' Z';
  const labels=vals.map((r,i)=>{
    const d=get(r,'Início da Semana (Data da segunda-feira)');
    return `<text x="${pad+(i/(nums.length-1||1))*(W-2*pad)}" y="${H+12}" text-anchor="middle" font-size="9" fill="#7A6555">${d?d.slice(0,5):`S${i+1}`}</text>`;
  }).join('');
  return `<div class="chart-area"><svg class="chart-svg" viewBox="0 0 ${W} ${H+20}" preserveAspectRatio="none">
    <defs><linearGradient id="gr" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5C3317" stop-opacity=".18"/><stop offset="100%" stop-color="#5C3317" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#gr)"/>
    <path d="${path}" fill="none" stroke="#C5A467" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
    ${pts.map((p,i)=>`<circle cx="${p[0]}" cy="${p[1]}" r="${i===nums.length-1-semanaIdx?4:2.5}" fill="${i===nums.length-1-semanaIdx?'#B8922A':'#5C3317'}" opacity="${i===nums.length-1-semanaIdx?1:.6}"><title>${fmtFn(nums[i])}</title></circle>`).join('')}
    ${labels}
  </svg></div>`;
}

// ── FINANCEIRO ────────────────────────────────────────────
function dualLineChart(registros, campo1, campo2, cor1, cor2, label1, label2, fmtFn){
  const vals=registros.slice(0,8).reverse();
  const nums1=vals.map(r=>parseNum(get(r,campo1))||0);
  const nums2=vals.map(r=>parseNum(get(r,campo2))||0);
  const allNums=[...nums1,...nums2];
  const max=Math.max(...allNums,1);
  const W=400, H=80, pad=10;
  function pts(nums){ return nums.map((v,i)=>{ const x=pad+(i/(nums.length-1||1))*(W-2*pad); const y=H-pad-((v/max))*(H-2*pad); return [x,y]; }); }
  function pathStr(p){ return 'M '+p.map(pt=>pt.join(',')).join(' L '); }
  function areaStr(p){ return 'M '+p[0][0]+','+H+' L '+p.map(pt=>pt.join(',')).join(' L ')+' L '+p[p.length-1][0]+','+H+' Z'; }
  const p1=pts(nums1), p2=pts(nums2);
  const labels=vals.map((r,i)=>{ const d=get(r,'Início da Semana (Data da segunda-feira)'); return `<text x="${pad+(i/(vals.length-1||1))*(W-2*pad)}" y="${H+12}" text-anchor="middle" font-size="9" fill="#7A6555">${d?d.slice(0,5):'S'+(i+1)}</text>`; }).join('');
  return `<div class="chart-area"><svg class="chart-svg" viewBox="0 0 ${W} ${H+20}" preserveAspectRatio="none">
    <defs>
      <linearGradient id="gr1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${cor1}" stop-opacity=".12"/><stop offset="100%" stop-color="${cor1}" stop-opacity="0"/></linearGradient>
      <linearGradient id="gr2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${cor2}" stop-opacity=".12"/><stop offset="100%" stop-color="${cor2}" stop-opacity="0"/></linearGradient>
    </defs>
    <path d="${areaStr(p1)}" fill="url(#gr1)"/>
    <path d="${areaStr(p2)}" fill="url(#gr2)"/>
    <path d="${pathStr(p1)}" fill="none" stroke="${cor1}" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="${pathStr(p2)}" fill="none" stroke="${cor2}" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="6 4"/>
    ${p1.map((p,i)=>`<circle cx="${p[0]}" cy="${p[1]}" r="2.5" fill="${cor1}" opacity=".7"><title>${label1}: ${fmtFn(nums1[i])}</title></circle>`).join('')}
    ${p2.map((p,i)=>`<circle cx="${p[0]}" cy="${p[1]}" r="2.5" fill="${cor2}" opacity=".7"><title>${label2}: ${fmtFn(nums2[i])}</title></circle>`).join('')}
    ${labels}
  </svg></div>
  <div style="display:flex;gap:1.25rem;margin-top:.5rem">
    <div style="display:flex;align-items:center;gap:.4rem;font-size:.7rem;color:var(--texto-suave)"><div style="width:20px;height:2px;background:${cor1};border-radius:2px"></div>${label1}</div>
    <div style="display:flex;align-items:center;gap:.4rem;font-size:.7rem;color:var(--texto-suave)"><div style="width:20px;height:2px;background:${cor2};border-radius:2px;border-top:2px dashed ${cor2}"></div>${label2}</div>
  </div>`;
}

function renderFinanceiro(r,rAnt,registros,_get=get){
  const receita=_get(r,'Receita Bruta da Semana');
  const despesas=_get(r,'Despesas Totais da Semana');
  const ticket=_get(r,'Ticket Médio da Semana');
  const acumulado=_get(r,'Faturamento Acumulado (Mês)');
  const meta=_get(r,'Meta de Faturamento Mensal');
  const top5=_get(r,'Top 5 Vendas');
  const vendas=_get(r,'Nº de Vendas Realizadas');
  const rA=parseNum(receita), dA=parseNum(despesas);
  const resultado=rA!==null&&dA!==null?rA-dA:null;
  const roi=dA&&dA>0&&rA!==null?((rA-dA)/dA*100).toFixed(1):null;
  const acumN=parseNum(acumulado), metaN=parseNum(meta);
  const pctMeta=acumN!==null&&metaN&&metaN>0?Math.min(100,(acumN/metaN*100)):null;
  const prev=rAnt||null;
  const _getPrev=(rc,c)=>getCons(rc,c);
  const top5HTML=top5?top5.split('\n').filter(Boolean).map((l,i)=>`<div class="top5-item"><div class="top5-num">${i+1}</div><div>${l.trim()}</div></div>`).join(''):'<div class="empty">Sem dados de vendas</div>';
  // Progresso sempre visível — zerado se sem dados
  const pctShow=pctMeta!==null?pctMeta:0;
  const progressHTML=`
    <div class="progress-card compact" style="flex:1">
      <div class="progress-header"><div class="progress-title">Meta Mensal</div><div class="progress-vals">${acumN!==null?fmt.brl(acumN):'—'} / ${metaN?fmt.brl(metaN):'—'}</div></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pctShow}%"></div></div>
      <div class="progress-pct">${pctMeta!==null?pctMeta.toFixed(1)+'% atingido':'Preencha a meta na planilha'}</div>
    </div>`;
  return `
  <!-- Fileira 1: 4 cards -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1rem;">
    <div class="kpi-card borda-marrom">
      <div class="kpi-label">Receita Bruta</div>
      <div class="kpi-value">${fmt.brl(receita)}</div>
      ${prev?comparativo(receita,_get(prev,'Receita Bruta da Semana')):''}
    </div>
    <div class="kpi-card borda-marrom">
      <div class="kpi-label">Despesas</div>
      <div class="kpi-value sm">${fmt.brl(despesas)}</div>
      ${prev?comparativo(despesas,_get(prev,'Despesas Totais da Semana')):''}
    </div>
    <div class="kpi-card borda-marrom">
      <div class="kpi-label">Resultado Líquido</div>
      <div class="kpi-value sm">${resultado!==null?fmt.brl(resultado):'—'}</div>
      ${prev?comparativo(resultado,parseNum(_get(prev,'Receita Bruta da Semana'))-parseNum(_get(prev,'Despesas Totais da Semana'))):''}
    </div>
    <div class="kpi-card borda-marrom">
      <div class="kpi-label">Ticket Médio</div>
      <div class="kpi-value sm">${fmt.brl(ticket)}</div>
      ${prev?comparativo(ticket,_get(prev,'Ticket Médio da Semana')):''}
    </div>
  </div>
  <!-- Fileira 2: 3 cards + barra de meta -->
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1.8fr;gap:1rem;margin-bottom:1.5rem;align-items:stretch;">
    <div class="kpi-card borda-marrom">
      <div class="kpi-label">Nº de Vendas</div>
      <div class="kpi-value sm">${vendas||'—'}</div>
      ${prev?comparativo(vendas,_get(prev,'Nº de Vendas Realizadas')):''}
    </div>
    <div class="kpi-card borda-marrom">
      <div class="kpi-label">ROI</div>
      <div class="kpi-value sm">${roi!==null?roi+'%':'—'}</div>
      <div class="kpi-sub">Retorno sobre despesas</div>
    </div>
    <div class="kpi-card borda-marrom">
      <div class="kpi-label">Faturamento Acumulado</div>
      <div class="kpi-value sm">${fmt.brl(acumulado)}</div>
      <div class="kpi-sub">${meta?'Meta: '+fmt.brl(meta):'—'}</div>

// ── COMERCIAL ─────────────────────────────────────────────
function renderComercial(r,rAnt,registros,_get=get){
  const leads    = _get(r,'Total de Leads Recebidos (Semana)');
  const conv     = _get(r,'Leads de Tráfego Convertidos (Venda Direta)');
  const recap    = _get(r,'Leads de Recaptação Convertidos (Base antiga)');
  const fora     = _get(r,'Leads Fora de Perfil (Desqualificados)');
  const agend    = _get(r,'Agendamentos/Visitas Realizadas');
  const vendas   = _get(r,'Nº de Vendas Realizadas');
  const analise  = _get(r,'Análise Estratégica de Leads');
  // Novos campos por canal
  const lInsta   = _get(r,'Leads Recebidos Instagram');
  const lWhats   = _get(r,'Leads Recebidos WhatsApp');
  const cInsta   = _get(r,'Leads Convertidos Instagram');
  const cWhats   = _get(r,'Leads Convertidos WhatsApp');

  const lN=parseNum(leads)||0, fN=parseNum(fora)||0, aN=parseNum(agend)||0, vN=parseNum(vendas)||0;
  const qual=Math.max(0,lN-fN);
  const taxaTotal=lN>0?((vN/lN)*100).toFixed(1):null;
  const prev=rAnt||null;

  const steps=[
    {label:'Leads Recebidos', val:lN,   color:'#5C3317'},
    {label:'Qualificados',    val:qual,  color:'#7A4520'},
    {label:'Agendamentos',    val:aN,    color:'#A0622A'},
    {label:'Vendas',          val:vN,    color:'#C5A467'},
  ];
  const maxV=steps[0].val||1;
  const funilHTML=steps.map((s,i)=>{
    const pct=Math.max(35,Math.round((s.val/maxV)*100));
    const prev_val=i>0?steps[i-1].val:null;
    const taxa=prev_val&&prev_val>0?((s.val/prev_val)*100).toFixed(0)+'%':null;
    const clip=i===0?'polygon(0 0,100% 0,96% 100%,4% 100%)':i===steps.length-1?'polygon(4% 0,96% 0,90% 100%,10% 100%)':'polygon(2% 0,98% 0,96% 100%,4% 100%)';
    return `
      ${i>0?`<div class="funil-connector" style="height:28px"><div class="funil-conn-line"></div>${taxa?`<div class="funil-taxa-badge">↓ ${taxa}</div>`:''}</div>`:''}
      <div style="width:${pct}%;background:${s.color};clip-path:${clip};padding:.7rem 1.4rem;display:flex;justify-content:space-between;align-items:center;border-radius:2px;">
        <span style="font-size:.72rem;color:rgba(255,255,255,.85);font-weight:500;letter-spacing:.3px">${s.label}</span>
        <span style="font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;color:#fff">${s.val||'—'}</span>
      </div>`;
  }).join('');

  // Card canal helper
  function cardCanal(label, val, prevVal){
    const n=parseNum(val);
    return `<div class="kpi-card borda-marrom">
      <div class="kpi-label" style="font-size:.6rem">${label}</div>
      <div class="kpi-value sm">${n!==null?n:'—'}</div>
      ${prev&&prevVal!==null?comparativo(val,prevVal):''}
    </div>`;
  }

  return `
  <!-- Linha 1: 4 cards principais -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1rem;">
    <div class="kpi-card borda-marrom">
      <div class="kpi-label">Total de Leads Recebidos (Semana)</div>
      <div class="kpi-value">${leads||'—'}</div>
      ${prev?comparativo(leads,_get(prev,'Total de Leads Recebidos (Semana)')):''}</div>
    <div class="kpi-card borda-marrom">
      <div class="kpi-label">Agendamentos</div>
      <div class="kpi-value sm">${agend||'—'}</div>
      ${prev?comparativo(agend,_get(prev,'Agendamentos/Visitas Realizadas')):''}</div>
    <div class="kpi-card borda-marrom">
      <div class="kpi-label">Vendas Realizadas</div>
      <div class="kpi-value sm">${vendas||'—'}</div>
      ${prev?comparativo(vendas,_get(prev,'Nº de Vendas Realizadas')):''}</div>
    <div class="kpi-card borda-marrom">
      <div class="kpi-label">Taxa Lead → Venda</div>
      <div class="kpi-value sm">${taxaTotal?taxaTotal+'%':'—'}</div>
      ${fora?`<div class="kpi-sub">${fora} fora do perfil</div>`:''}
    </div>
  </div>
  <!-- Linha 2: 5 cards por canal -->
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:1rem;margin-bottom:1.5rem;">
    ${cardCanal('Leads Recebidos Instagram', lInsta, prev?_get(prev,'Leads Recebidos Instagram'):null)}
    ${cardCanal('Leads Recebidos WhatsApp',  lWhats, prev?_get(prev,'Leads Recebidos WhatsApp'):null)}
    ${cardCanal('Leads Convertidos Instagram', cInsta, prev?_get(prev,'Leads Convertidos Instagram'):null)}
    ${cardCanal('Leads Convertidos WhatsApp',  cWhats, prev?_get(prev,'Leads Convertidos WhatsApp'):null)}
    ${cardCanal('Leads de Recaptação', recap, prev?_get(prev,'Leads de Recaptação Convertidos (Base antiga)'):null)}
  </div>
  <!-- Funil + Histórico -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;">
    <div class="card borda-marrom">
      <div class="card-title">Funil de Conversão</div>
      <div class="funil-wrap" style="padding:.5rem 0">${funilHTML}</div>
      <div class="funil-taxa-total" style="margin-top:1rem">
        Taxa total de conversão: <strong>${taxaTotal?taxaTotal+'%':'—'}</strong>
        ${parseNum(recap)?` &nbsp;·&nbsp; ${recap} via recaptação`:''}
        ${fN?` &nbsp;·&nbsp; ${fN} fora do perfil`:''}
      </div>
    </div>
    <div class="card borda-marrom">
      <div class="card-title">Histórico · Leads Semanais</div>
      ${lineChart(registros,'Total de Leads Recebidos (Semana)',v=>v+' leads')}
      ${analise?`<div class="section-row"><div class="section-line"></div><div class="section-label">Análise</div><div class="section-line"></div></div><div class="analise-box">${analise}</div>`:''}
    </div>
  </div>`;
}

// ── INSIGHTS IA ───────────────────────────────────────────

function gerarInsightsIA(r, rAnt, registros, _get=get){
  // ── Coleta de dados ──────────────────────────────────────
  const receita   = parseNum(get(r,'Receita Bruta da Semana'));
  const despesas  = parseNum(get(r,'Despesas Totais da Semana'));
  const ticket    = parseNum(get(r,'Ticket Médio da Semana'));
  const acumulado = parseNum(get(r,'Faturamento Acumulado (Mês)'));
  const meta      = parseNum(get(r,'Meta de Faturamento Mensal'));
  const vendas    = parseNum(get(r,'Nº de Vendas Realizadas'));
  const leads     = parseNum(get(r,'Total de Leads Recebidos (Semana)'));
  const agend     = parseNum(get(r,'Agendamentos/Visitas Realizadas'));
  const fora      = parseNum(get(r,'Leads Fora de Perfil (Desqualificados)'));
  const conv      = parseNum(get(r,'Leads de Tráfego Convertidos (Venda Direta)'));
  const recap     = parseNum(get(r,'Leads de Recaptação Convertidos (Base antiga)'));
  const seg       = parseNum(get(r,'Novos Seguidores (Instagram)'));
  const criativos = parseNum(get(r,'Quantidade de Criativos Publicados (Total da semana)'));
  const investido = parseNum(get(r,'Valor Total Investido (Semana)'));
  const cpl       = parseNum(get(r,'CPL Médio (Custo por Lead)'));
  const ctr       = parseNum(get(r,'CTR Médio (Taxa de Clique)'));
  const roas      = parseNum(get(r,'ROAS (Retorno sobre Investimento)'));
  const curtidas  = parseNum(get(r,'Curtidas (Melhor Criativo)'));
  const compart   = parseNum(get(r,'Compartilhamentos (Melhor Criativo)'));

  // Dados semana anterior
  const recAnt  = rAnt ? parseNum(get(rAnt,'Receita Bruta da Semana'))  : null;
  const leadAnt = rAnt ? parseNum(get(rAnt,'Total de Leads Recebidos (Semana)')) : null;
  const segAnt  = rAnt ? parseNum(get(rAnt,'Novos Seguidores (Instagram)')) : null;
  const invAnt  = rAnt ? parseNum(get(rAnt,'Valor Total Investido (Semana)')) : null;
  const cplAnt  = rAnt ? parseNum(get(rAnt,'CPL Médio (Custo por Lead)')) : null;

  // ── Cálculos derivados ───────────────────────────────────
  const taxaConv     = leads>0 && vendas!==null   ? (vendas/leads*100)   : null;
  const taxaFora     = leads>0 && fora!==null      ? (fora/leads*100)    : null;
  const taxaAgend    = leads>0 && agend!==null     ? (agend/leads*100)   : null;
  const resultado    = receita!==null && despesas!==null ? receita-despesas : null;
  const roi          = despesas>0 && receita!==null ? ((receita-despesas)/despesas*100) : null;
  const pctMeta      = acumulado>0 && meta>0 ? (acumulado/meta*100) : null;
  const varReceita   = recAnt>0 && receita!==null  ? ((receita-recAnt)/recAnt*100)  : null;
  const varLeads     = leadAnt>0 && leads!==null   ? ((leads-leadAnt)/leadAnt*100)  : null;
  const varSeg       = segAnt>0 && seg!==null      ? ((seg-segAnt)/segAnt*100)      : null;
  const varCpl       = cplAnt>0 && cpl!==null      ? ((cpl-cplAnt)/cplAnt*100)     : null;
  const engaj        = (curtidas||0)+(compart||0);

  // ── Motor de regras ──────────────────────────────────────
  const insights = [];

  function add(cor, titulo, descricao){ insights.push({cor, titulo, descricao}); }

  // FINANCEIRO
  if(pctMeta!==null){
    if(pctMeta>=100)      add('green','Meta mensal atingida — momento de escalar','Faturamento acumulado superou a meta. Considere elevar o teto para o próximo mês.');
    else if(pctMeta>=80)  add('yellow',`Meta ${pctMeta.toFixed(0)}% atingida — reta final do mês`,'Falta pouco para bater a meta. Priorize fechamentos pendentes e recaptação de base.');
    else if(pctMeta>=50)  add('yellow',`Meta ${pctMeta.toFixed(0)}% atingida — ritmo dentro do esperado`,'Ritmo compatível com o mês. Mantenha a cadência de vendas e acompanhe semanalmente.');
    else                  add('red',`Meta ${pctMeta.toFixed(0)}% atingida — ritmo abaixo do necessário`,'Necessário acelerar conversões. Revisar funil e intensificar follow-up com leads em aberto.');
  }

  if(roi!==null){
    if(roi>=200)      add('green',`ROI de ${roi.toFixed(0)}% — operação altamente rentável`,'Cada real gasto está gerando mais de 3x em retorno. Estrutura financeira saudável.');
    else if(roi>=80)  add('yellow',`ROI de ${roi.toFixed(0)}% — margem positiva, mas pode melhorar`,'Retorno positivo. Avaliar onde estão as principais despesas para otimizar margem.');
    else if(roi>=0)   add('yellow',`ROI de ${roi.toFixed(0)}% — margem apertada esta semana`,'Resultado positivo, mas próximo do equilíbrio. Atenção ao controle de despesas.');
    else              add('red',`ROI negativo (${roi.toFixed(0)}%) — despesas superaram receita`,'Semana com resultado negativo. Revisar despesas e antecipar recebimentos pendentes.');
  }

  if(varReceita!==null){
    if(varReceita>=15)      add('green',`Receita cresceu ${varReceita.toFixed(0)}% vs semana anterior`,'Crescimento consistente. Identificar o que funcionou e replicar na próxima semana.');
    else if(varReceita>=-5) add('yellow',`Receita estável (${varReceita>0?'+':''}${varReceita.toFixed(0)}% vs semana anterior)`,'Desempenho similar à semana anterior. Buscar alavancas para crescimento.');
    else                    add('red',`Receita caiu ${Math.abs(varReceita).toFixed(0)}% vs semana anterior`,'Queda de faturamento. Verificar volume de atendimentos e procedimentos realizados.');
  }

  // COMERCIAL
  if(taxaConv!==null){
    if(taxaConv>=10)     add('green',`Taxa de conversão de ${taxaConv.toFixed(1)}% — acima da média`,'Boa conversão de leads em vendas. Manter o processo comercial atual.');
    else if(taxaConv>=5) add('yellow',`Taxa de conversão de ${taxaConv.toFixed(1)}% — dentro da média`,'Conversão razoável. Identificar objeções recorrentes para melhorar o fechamento.');
    else                 add('red',`Taxa de conversão de ${taxaConv.toFixed(1)}% — abaixo do esperado`,'Poucos leads estão convertendo em vendas. Revisar abordagem comercial e qualidade dos leads.');
  }

  if(taxaFora!==null && taxaFora>20)
    add('red',`${taxaFora.toFixed(0)}% dos leads fora do perfil — qualidade baixa`,'Alto índice de leads desqualificados. Revisar segmentação das campanhas e copy dos anúncios.');

  if(varLeads!==null){
    if(varLeads>=20)       add('green',`Volume de leads cresceu ${varLeads.toFixed(0)}% esta semana`,'Aumento significativo na captação. Garantir estrutura de atendimento para absorver o volume.');
    else if(varLeads<=-20) add('red',`Volume de leads caiu ${Math.abs(varLeads).toFixed(0)}% esta semana`,'Queda acentuada na captação. Verificar campanhas ativas e orçamento de tráfego.');
  }

  if(recap!==null && recap>0)
    add('green',`${recap} vendas via recaptação — base antiga convertendo`,'A estratégia de recaptação está funcionando. Manter fluxo ativo para base de leads antigos.');

  // MARKETING
  if(varSeg!==null){
    if(varSeg>=20)     add('green',`Seguidores cresceram ${varSeg.toFixed(0)}% vs semana anterior`,'Crescimento orgânico expressivo. Os conteúdos estão atraindo o público certo.');
    else if(varSeg<0)  add('yellow',`Seguidores reduziram ${Math.abs(varSeg).toFixed(0)}% vs semana anterior`,'Queda no crescimento orgânico. Avaliar frequência e relevância dos conteúdos publicados.');
  }

  if(criativos!==null){
    if(criativos>=5)  add('green',`${criativos} criativos publicados — boa frequência de conteúdo`,'Volume adequado de publicações. Manter consistência e testar formatos variados.');
    else if(criativos<=2) add('yellow',`Apenas ${criativos} criativo(s) publicado(s) esta semana`,'Frequência baixa de conteúdo. Considerar aumentar para 4-5 publicações semanais.');
  }

  // TRÁFEGO
  if(cpl!==null){
    if(cpl<=10)       add('green',`CPL de ${fmt.brl(cpl)} — muito competitivo para o nicho`,'Custo por lead eficiente. Momento ideal para aumentar investimento e escalar captação.');
    else if(cpl<=20)  add('yellow',`CPL de ${fmt.brl(cpl)} — dentro da faixa aceitável`,'Custo por lead razoável. Testar variações de criativos para reduzir o CPL.');
    else              add('red',`CPL de ${fmt.brl(cpl)} — acima do ideal`,'Custo por lead elevado. Pausar anúncios de pior performance e realocar budget.');
  }

  if(varCpl!==null && varCpl>30)
    add('red',`CPL subiu ${varCpl.toFixed(0)}% vs semana anterior — atenção ao orçamento`,'Custo crescendo rapidamente. Revisar segmentação e criativos com maior gasto.');

  if(roas!==null && roas>0){
    if(roas>=5)      add('green',`ROAS de ${roas.toFixed(1)}x — retorno excelente sobre o investimento`,'Para cada real investido em tráfego, ${roas.toFixed(1)}x está retornando em receita.');
    else if(roas>=2) add('yellow',`ROAS de ${roas.toFixed(1)}x — retorno positivo, há espaço para escalar`,'Campanha rentável. Testar aumento gradual de investimento mantendo o ROAS acima de 2x.');
    else             add('red',`ROAS de ${roas.toFixed(1)}x — retorno abaixo do esperado`,'Investimento não está gerando retorno suficiente. Otimizar criativos e segmentação.');
  }

  // Garantir mínimo de 4 cards mesmo com dados vazios
  if(insights.length===0)
    add('yellow','Preencha os dados na planilha para ver os insights','Complete os campos da semana no Google Sheets e os insights aparecerão automaticamente aqui.');

  // ── Renderizar ───────────────────────────────────────────
  const grid=document.getElementById('insights-grid');
  if(!grid) return;
  grid.style.display='grid';
  grid.innerHTML=insights.map(ins=>`
    <div class="insight-card ${ins.cor}">
      <div class="insight-title">${ins.titulo}</div>
      <div class="insight-desc">${ins.descricao}</div>
    </div>`).join('');
}

// ── NAVEGAÇÃO ─────────────────────────────────────────────
document.querySelectorAll('.nav-item').forEach(item=>{
  item.addEventListener('click',()=>{
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    item.classList.add('active');
    moduloAtivo=item.dataset.modulo;
    document.getElementById('page-title').textContent=TITULOS[moduloAtivo];
    semanaIdx=0;
    renderModulo();
    // Fechar menu mobile
    const nav=document.getElementById('sidebar-nav');
    if(nav&&window.innerWidth<=768) nav.classList.remove('open');
  });
});
// Multi-select logic
let clientesSelecionados = [];
function somenteEste(e, nome){
  e.stopPropagation();
  document.querySelectorAll('.ms-cliente-cb').forEach(cb=>{ cb.checked = cb.value===nome; });
  atualizarClientesSelecionados();
}
function toggleMS(){
  const dd=document.getElementById('ms-dropdown');
  const btn=document.getElementById('ms-btn');
  dd.classList.toggle('open');
  btn.classList.toggle('open');
}
document.addEventListener('click',e=>{
  const wrap=document.getElementById('ms-wrap');
  if(wrap && !wrap.contains(e.target)){
    document.getElementById('ms-dropdown').classList.remove('open');
    document.getElementById('ms-btn').classList.remove('open');
  }
});
function toggleTodos(){
  const all=document.getElementById('ms-all');
  all.checked = !all.checked;
  document.querySelectorAll('.ms-cliente-cb').forEach(cb=>cb.checked=all.checked);
  atualizarClientesSelecionados();
}
function atualizarClientesSelecionados(){
  const cbs=[...document.querySelectorAll('.ms-cliente-cb')];
  clientesSelecionados=cbs.filter(cb=>cb.checked).map(cb=>cb.value);
  const allCb=document.getElementById('ms-all');
  allCb.checked=clientesSelecionados.length===cbs.length;
  const label=clientesSelecionados.length===0?'Nenhum':clientesSelecionados.length===cbs.length?'Todos os clientes':clientesSelecionados.length===1?clientesSelecionados[0]:`${clientesSelecionados.length} clientes`;
  document.getElementById('ms-btn').textContent=label;
  semanaIdx=0;
  renderModulo();
}
document.getElementById('date-from').addEventListener('change',()=>{semanaIdx=0;renderModulo();});
document.getElementById('date-to').addEventListener('change',()=>{semanaIdx=0;renderModulo();});

// render insights pode retornar promise
const _origRenderModulo=renderModulo;
</script>
